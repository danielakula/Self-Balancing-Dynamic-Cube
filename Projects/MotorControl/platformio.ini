[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    askuric/Simple FOC @ ^2.4.0
    bakercp/PacketSerial @ ^1.4.0
build_flags =
    -D SIMPLEFOC_ESP32_USEMCPWM

[env:master]
build_src_filter = -<*> +<master.cpp>
upload_speed = 921600
upload_port = COM[4]
upload_protocol = esptool
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1  ; Native USB Output
; upload_protocol = espota
; upload_port = 10.134.249.182

[env:slave]
build_src_filter = -<*> +<slave.cpp>
upload_protocol = esptool
upload_port = COM[3]
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0  ; UART Output
; upload_protocol = espota
; upload_port = 10.134.249.173