; --- BASE ENVIRONMENT ---
[env:UI_Balance]
; Base platform is the modern Core 3.x for the Master
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default.csv
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = deep+

; Global libraries BOTH microcontrollers need
lib_deps = 
    bakercp/PacketSerial @ ^1.4.0

; --- MASTER MCU (Control Brain) ---
[env:master]
extends = env:UI_Balance
build_src_filter = -<*> +<master.cpp> +<InterchipComms.cpp> +<IMU.cpp> +<LQR.cpp> +<VoltageMonitor.cpp> +<Driver.cpp>
upload_port = COM4
upload_protocol = esptool
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1  ; Native USB Output
lib_ignore = WebDashboard       
lib_deps =
    ${env:UI_Balance.lib_deps}
    askuric/Simple FOC @ ^2.4.0   ; <--- STRICTLY ONLY FOR MASTER
    https://github.com/adafruit/Adafruit_LSM6DS.git
    https://github.com/adafruit/Adafruit_Sensor.git
    https://github.com/adafruit/Adafruit_BusIO.git

; --- SLAVE MCU (Wi-Fi Dashboard) ---
; --- SLAVE MCU (Wi-Fi Dashboard) ---
[env:slave]
; 1. Completely isolated platform (Core 2.0.17 - The Golden Standard)
platform = espressif32 @ 6.9.0
board = esp32-s3-devkitm-1
framework = arduino
board_upload.flash_size = 16MB
board_build.partitions = default.csv
monitor_speed = 115200
upload_speed = 921600
upload_port = COM3
upload_protocol = esptool

; 2. Only build the Slave files
build_src_filter = -<*> +<slave.cpp> +<InterchipComms.cpp>

; 3. Stop PlatformIO from aggressively scanning the wrong folders
lib_ldf_mode = chain

; 4. Force C++17 so your Config.h "inline constexpr" works flawlessly
build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0

board_build.filesystem = littlefs

; 5. Block the motor code entirely
lib_ignore =
    Simple FOC
    Driver
    IMU
    LQR

; 6. Use the exact async version guaranteed to work on Core 2.0.17
lib_deps =
    bakercp/PacketSerial @ ^1.4.0
    bblanchon/ArduinoJson @ ^6.21.3
    https://github.com/me-no-dev/ESPAsyncWebServer.git ; The original stable version
    https://github.com/me-no-dev/AsyncTCP.git